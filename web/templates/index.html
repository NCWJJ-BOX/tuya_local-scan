<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuya Energy Dashboard</title>
    <meta name="description" content="Real-time energy monitoring dashboard for Tuya smart plugs">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ───── Header ───── -->
    <header class="app-header">
        <div class="header-left">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
                <span class="logo-text">Energy<span class="logo-accent">Hub</span></span>
            </div>
            <div class="header-live-badge" id="live-badge">
                <span class="live-dot"></span>
                <span>LIVE</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="poll-control">
                <label class="poll-label">Auto-refresh</label>
                <select id="poll-interval" class="poll-select" onchange="setPollInterval(this.value)">
                    <option value="0">Off</option>
                    <option value="3000">3s</option>
                    <option value="5000" selected>5s</option>
                    <option value="10000">10s</option>
                    <option value="30000">30s</option>
                </select>
            </div>
            <button id="btn-refresh" class="btn btn-ghost" onclick="refreshAllStatus()" title="Refresh all">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
            </button>
            <button id="btn-scan" class="btn btn-secondary" onclick="startScan()">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <span>Scan</span>
            </button>
        </div>
    </header>

    <!-- ───── Status Bar ───── -->
    <div id="status-bar" class="status-bar hidden">
        <div class="status-content">
            <div class="status-spinner"></div>
            <span id="status-text">Scanning network...</span>
        </div>
    </div>

    <!-- ───── Toast ───── -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ───── Main Content ───── -->
    <main class="main-content">
        <!-- Summary Strip -->
        <div class="summary-strip" id="summary-strip">
            <div class="summary-item">
                <div class="summary-icon summary-icon-power">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <div class="summary-data">
                    <div class="summary-value" id="total-power">—</div>
                    <div class="summary-label">Total Power</div>
                </div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <div class="summary-icon summary-icon-voltage">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div class="summary-data">
                    <div class="summary-value" id="avg-voltage">—</div>
                    <div class="summary-label">Avg Voltage</div>
                </div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <div class="summary-icon summary-icon-devices">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2"/>
                        <path d="M16 7V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v3"/>
                    </svg>
                </div>
                <div class="summary-data">
                    <div class="summary-value"><span id="stat-online">0</span> / <span id="stat-total">0</span></div>
                    <div class="summary-label">Online Devices</div>
                </div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <div class="summary-icon summary-icon-energy">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    </svg>
                </div>
                <div class="summary-data">
                    <div class="summary-value" id="total-energy">—</div>
                    <div class="summary-label">Total Energy</div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h2>No Devices Found</h2>
            <p>Scan your local network to discover Tuya energy monitoring plugs.</p>
            <div class="empty-actions">
                <button class="btn btn-primary" onclick="startScan()">Scan Network</button>
            </div>
        </div>

        <!-- Device Cards -->
        <div id="devices-grid" class="devices-grid"></div>
    </main>

    <!-- ───── Device Detail Modal ───── -->
    <div id="device-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Device</h2>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- ───── Edit Device Modal ───── -->
    <div id="edit-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeEditModal()">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2>Edit Device</h2>
                <button class="modal-close" onclick="closeEditModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="edit-form" onsubmit="saveDeviceEdit(event)">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label for="edit-name">Name</label>
                        <input type="text" id="edit-name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-type">Type</label>
                        <select id="edit-type" class="form-input">
                            <option value="switch">Switch / Plug</option>
                            <option value="light">Light / Bulb</option>
                            <option value="cover">Cover / Curtain</option>
                            <option value="sensor">Sensor</option>
                            <option value="fan">Fan</option>
                            <option value="lock">Lock</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-ip">IP Address</label>
                        <input type="text" id="edit-ip" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="edit-key">Local Key</label>
                        <input type="text" id="edit-key" class="form-input" placeholder="16-char key">
                    </div>
                    <div class="form-group">
                        <label for="edit-version">Protocol Version</label>
                        <select id="edit-version" class="form-input">
                            <option value="3.1">3.1</option>
                            <option value="3.2">3.2</option>
                            <option value="3.3">3.3</option>
                            <option value="3.4">3.4</option>
                            <option value="3.5" selected>3.5</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
